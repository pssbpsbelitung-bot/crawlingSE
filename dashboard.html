<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Digital Economy Monitor Belitung</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#2c7be5;
color:white;
}

</style>

</head>

<body>

<h1>Monitoring Ekonomi Digital Belitung</h1>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">

<table>

<thead>
<tr>
<th>No</th>
<th>Sumber</th>
<th>Konten</th>
<th>Link</th>
</tr>
</thead>

<tbody id="tabel"></tbody>

</table>

</div>

<script>

fetch("data.json")
.then(r=>r.json())
.then(data=>{

let tbody=document.getElementById("tabel")

data.forEach((d,i)=>{

tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${d.source}</td>
<td>${d.text}</td>
<td><a href="${d.url}" target="_blank">Buka</a></td>
</tr>
`

})

let count={}

data.forEach(d=>{
count[d.source]=(count[d.source]||0)+1
})

new Chart(document.getElementById("chart"),{
type:"pie",
data:{
labels:Object.keys(count),
datasets:[{
data:Object.values(count)
}]
}
})

})

</script>

</body>
</html>
