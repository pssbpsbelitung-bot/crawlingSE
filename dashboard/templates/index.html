<!DOCTYPE html>
<html>

<head>

<title>Monitoring Usaha Digital Belitung</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet"
href="/static/style.css">

</head>

<body>

<h1>Monitoring Usaha Digital Belitung</h1>

<h2>Total Usaha: {{total}}</h2>

<div id="map"></div>

<script>

var map = L.map('map')
.setView([-2.745,107.634],10);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

var locations = {{locations | safe}};

locations.forEach(function(loc){

if(loc.lat){

L.marker([loc.lat,loc.lon])
.addTo(map)
.bindPopup(
loc.username
);

}

});

</script>

</body>
</html>
